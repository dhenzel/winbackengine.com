name: Deploy to SiteGround

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview only — log the upload plan without transferring any files'
        type: boolean
        default: true

  # STEP 2 (after first successful manual dry-run + deploy): uncomment these
  # four lines to make every push to main auto-deploy. Keep the workflow_dispatch
  # block above for future on-demand deploys and dry-runs.
  #
  # push:
  #   branches: [main]
  #   paths-ignore:
  #     - 'README*.md'

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Deploy to SiteGround via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          # SiteGround FTP home is typically /home/USER/ — the public web
          # root lives under winbackengine.com/public_html/. This matches
          # the path used historically in scripts/publish-post.js.
          server-dir: ./winbackengine.com/public_html/
          local-dir: ./dist/
          dry-run: ${{ inputs.dry_run || false }}
          log-level: verbose
          # Preserve SiteGround-specific files that aren't in the repo.
          # Without this, the action would delete them to match dist/.
          exclude: |
            **/.htaccess
            **/.htpasswd
            **/wp-*/**
            **/wp-*
            **/cgi-bin/**
            **/.well-known/**
            **/error_log
            **/php.ini
            **/phpinfo.php
            **/.ftp-deploy-sync-state.json
